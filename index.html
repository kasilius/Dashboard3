<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المختبر الذكي - مدرسة ناصر العطية</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ai-bg-active: #cce9ff; 
            --ai-text-active: #004a77; 
            --border-color: #eef2f6;
            --sidebar-width: 350px;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Tajawal', sans-serif; background-color: #fff; overflow: hidden; }
        #app { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: #ffffff; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; transition: 0.3s ease; z-index: 100; position: relative; }
        .sidebar-hidden { width: 0 !important; transform: translateX(100%); opacity: 0; visibility: hidden; }

        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .header h2 { font-family: 'Changa', sans-serif; color: var(--ai-text-active); margin: 0; font-size: 1.1rem; }

        /* Goals */
        .goals-list { flex: 1; padding: 15px; overflow-y: auto; }
        .goal-card { border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .goal-card.active { border-color: var(--ai-bg-active); background: #fff; }
        .goal-label { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: var(--ai-text-active); font-weight: bold; font-size: 0.85rem; }
        .goal-content { padding: 15px; border-top: 1px dashed var(--ai-bg-active); background: #fff; border-radius: 0 0 12px 12px; }
        .font-tool { margin-top: 10px; padding: 8px; background: var(--ai-bg-active); border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        input[type="range"] { flex: 1; accent-color: var(--ai-text-active); }

        /* Content Area */
        .content { flex: 1; display: flex; flex-direction: column; position: relative; transition: 0.3s; background: #f8f9fa; }
        .tabs-bar { background: #fff; padding: 12px 20px; display: flex; gap: 8px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        
        .tab-btn { padding: 8px 20px; border: none; background: transparent; color: #5f6368; cursor: pointer; border-radius: 50px; font-weight: 700; font-size: 0.9rem; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .tab-btn.active { background-color: var(--ai-bg-active) !important; color: var(--ai-text-active) !important; }
        .tab-btn.active::before { content: '✦'; font-size: 1rem; }

        .iframe-stage { flex: 1; padding: 15px; position: relative; }
        iframe { width: 100%; height: 100%; border-radius: 15px; border: 1px solid var(--border-color); background: #fff; }
        canvas { position: absolute; top: 15px; left: 15px; width: calc(100% - 30px); height: calc(100% - 30px); z-index: 50; pointer-events: none; border-radius: 15px; }
        canvas.active { pointer-events: auto; cursor: crosshair; }

        /* Tools */
        .floating-tools { position: fixed; bottom: 15px; left: 15px; display: flex; gap: 8px; z-index: 1000; align-items: center; }
        .tool-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--ai-text-active); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .color-picker { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; padding: 0; }
        .toggle-sidebar { position: absolute; top: 50%; right: 0; width: 18px; height: 35px; background: var(--ai-bg-active); border: none; border-radius: 4px 0 0 4px; cursor: pointer; color: var(--ai-text-active); z-index: 101; }

        /* Admin Panel */
        .admin-panel { position: fixed; right: 10px; bottom: 70px; width: 280px; background: #fff; border: 1px solid var(--border-color); border-radius: 15px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; }
        .admin-panel h4 { margin: 0 0 10px; color: var(--ai-text-active); font-size: 0.9rem; }
        .admin-input { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: 'Tajawal'; }
        .admin-btn { width: 100%; padding: 8px; background: var(--ai-text-active); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .delete-btn { color: #dc2626; font-size: 0.7rem; cursor: pointer; background: #fee2e2; border: none; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app">
    <aside class="sidebar" :class="{'sidebar-hidden': fullWidth}">
        <div class="header"><h2>{{ lessonTitle }}</h2></div>
        <div class="goals-list">
            <div v-for="(goal, i) in currentGoals" :key="i" class="goal-card" :class="{ active: activeGoal === i }">
                <div class="goal-label" @click="activeGoal = (activeGoal === i ? null : i)">
                    <span>الهدف {{ i + 1 }}</span>
                    <span>{{ activeGoal === i ? '▲' : '▼' }}</span>
                </div>
                <div v-if="activeGoal === i" class="goal-content animate__animated animate__fadeIn">
                    <p :style="{ fontSize: gSize + 'px', color: '#1e293b', margin: '0 0 10px 0' }">{{ goal }}</p>
                    <div class="font-tool">
                        <input type="range" min="14" max="40" v-model="gSize">
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="content">
        <button class="toggle-sidebar" @click="fullWidth = !fullWidth">{{ fullWidth ? '◀' : '▶' }}</button>
        <nav class="tabs-bar">
            <div v-for="(tab, i) in tabs" :key="i" style="display:flex; align-items:center; gap:4px;">
                <button @click="currentTab = i" :class="['tab-btn', { active: currentTab === i }]">
                    {{ tab.name }}
                </button>
                <button v-if="showAdmin" class="delete-btn" @click="removeTab(i)">حذف</button>
            </div>
        </nav>
        <div class="iframe-stage">
            <iframe v-if="tabs.length > 0" :src="tabs[currentTab].url" allowfullscreen></iframe>
            <div v-else style="display:flex; justify-content:center; align-items:center; height:100%; color:#999;">لا توجد أنشطة مضافة</div>
            <canvas id="canvas" :class="{ active: penMode }"></canvas>
        </div>
    </main>

    <!-- Admin Panel Control -->
    <div v-if="showAdmin" class="admin-panel animate__animated animate__slideInUp">
        <h4>إضافة تبويب جديد</h4>
        <input class="admin-input" v-model="newTab.name" placeholder="اسم النشاط">
        <input class="admin-input" v-model="newTab.url" placeholder="رابط النشاط">
        <textarea class="admin-input" v-model="newTab.goalsStr" placeholder="الأهداف (هدف في كل سطر)" rows="3"></textarea>
        <button class="admin-btn" @click="addTab">إضافة ✅</button>
        <button class="admin-btn" style="background:#64748b" @click="showAdmin = false">إغلاق</button>
    </div>

    <!-- Floating Tools -->
    <div class="floating-tools">
        <button class="tool-btn" @click="showAdmin = !showAdmin">⚙️</button>
        <input type="color" v-model="penColor" class="color-picker">
        <button class="tool-btn" :style="{ background: penMode ? '#e11d48' : '' }" @click="penMode = !penMode">✏️</button>
        <button class="tool-btn" @click="clear">🗑️</button>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, watch, computed } = Vue;
    createApp({
        setup() {
            // تحميل البيانات من LocalStorage أو استخدام الافتراضي
            const savedTabs = JSON.parse(localStorage.getItem('smart_lab_tabs')) || [
                { name: 'المختبر', url: 'https://phet.colorado.edu/sims/html/build-an-atom/latest/build-an-atom_all.html?locale=ar', goals: ['تحديد تركيب النواة بدقة.', 'شرح الفرق بين النظائر.'] }
            ];

            const lessonTitle = ref('منصة ناصر العطية التفاعلية 🔬');
            const tabs = ref(savedTabs);
            const currentTab = ref(0);
            const activeGoal = ref(null);
            const gSize = ref(18);
            const fullWidth = ref(false);
            const penMode = ref(false);
            const penColor = ref('#004a77');
            const showAdmin = ref(false);
            const newTab = ref({ name: '', url: '', goalsStr: '' });

            const currentGoals = computed(() => {
                return tabs.value[currentTab.value]?.goals || [];
            });

            // حفظ التعديلات تلقائياً
            watch(tabs, (newVal) => {
                localStorage.setItem('smart_lab_tabs', JSON.stringify(newVal));
            }, { deep: true });

            const addTab = () => {
                if (newTab.value.name && newTab.value.url) {
                    const goalsArray = newTab.value.goalsStr.split('\n').filter(g => g.trim() !== '');
                    tabs.value.push({ name: newTab.value.name, url: newTab.value.url, goals: goalsArray });
                    newTab.value = { name: '', url: '', goalsStr: '' };
                }
            };

            const removeTab = (index) => {
                if (confirm('هل تريد حذف هذا التبويب؟')) {
                    tabs.value.splice(index, 1);
                    if (currentTab.value >= tabs.value.length) currentTab.value = 0;
                }
            };

            let ctx, canvas;
            onMounted(() => {
                canvas = document.getElementById('canvas');
                ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                let drawing = false;
                canvas.addEventListener('mousedown', () => drawing = true);
                canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
                canvas.addEventListener('mousemove', (e) => {
                    if(!drawing || !penMode.value) return;
                    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = penColor.value;
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                    ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                });
            });

            return { 
                lessonTitle, tabs, currentTab, activeGoal, gSize, fullWidth, 
                penMode, penColor, showAdmin, newTab, currentGoals,
                addTab, removeTab, clear: () => ctx.clearRect(0,0,canvas.width,canvas.height) 
            };
        }
    }).mount('#app');
</script>
</body>
</html>
