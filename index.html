<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة قسم الكيمياء - مدرسة ناصر العطية</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ai-primary: #0284c7; 
            --ai-secondary: #f0f9ff; 
            --border-color: #e2e8f0;
            --sidebar-width: 350px;
            --text-main: #1e293b;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Tajawal', sans-serif; background-color: #f8fafc; overflow: hidden; color: var(--text-main); }
        #app { display: flex; height: 100vh; width: 100vw; }

        /* القائمة الجانبية */
        .sidebar { width: var(--sidebar-width); background: #fff; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; transition: 0.3s ease; z-index: 100; position: relative; box-shadow: 4px 0 10px rgba(0,0,0,0.02); }
        .sidebar-hidden { width: 0 !important; transform: translateX(100%); opacity: 0; visibility: hidden; }
        .header { padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--ai-secondary); flex-shrink: 0; }
        .header h2 { font-family: 'Changa', sans-serif; color: var(--ai-primary); margin: 0; font-size: 1.3rem; }

        /* قائمة الأهداف الثابتة لكل التابات */
        .goals-list { flex: 1; padding: 15px; overflow-y: auto; border-bottom: 1px solid var(--border-color); background: #fcfdfe; }
        .goal-card { border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 12px; cursor: pointer; background: #fff; transition: 0.2s; }
        .goal-card:hover { border-color: var(--ai-primary); transform: translateY(-2px); }
        .goal-card.active { border-color: var(--ai-primary); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.08); }
        .goal-label { padding: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--ai-primary); font-weight: bold; font-size: 0.95rem; }
        .goal-content { padding: 14px; border-top: 1px dashed var(--border-color); color: #475569; line-height: 1.7; font-size: 0.9rem; }

        /* لوحة أدوات التحكم المنفصلة */
        .toolbox-panel { background: #fff; border-top: 2px solid var(--ai-secondary); flex-shrink: 0; transition: 0.3s ease; }
        .toolbox-header { padding: 12px 15px; background: var(--ai-secondary); color: var(--ai-primary); display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .toolbox-body { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        .collapsed-body { display: none; }

        .preview-box { height: 50px; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .preview-circle { border-radius: 50%; transition: 0.1s; border: 1px solid rgba(0,0,0,0.05); }

        .tool-row { display: flex; flex-direction: column; gap: 6px; }
        .tool-row label { font-size: 0.8rem; color: var(--text-main); font-weight: 700; display: flex; justify-content: space-between; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-tool { flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.85rem; border: 1px solid var(--border-color); transition: 0.2s; }
        .btn-tool:active { transform: scale(0.95); }

        /* منطقة المحتوى */
        .content { flex: 1; display: flex; flex-direction: column; position: relative; background: #f1f5f9; }
        .tabs-bar { background: #fff; padding: 10px 20px; display: flex; gap: 8px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: 1px solid transparent; background: #f8fafc; color: #64748b; cursor: pointer; border-radius: 10px; font-weight: 700; font-size: 0.85rem; transition: 0.3s; }
        .tab-btn.active { background-color: var(--ai-secondary); color: var(--ai-primary); border-color: var(--ai-primary); }

        .iframe-stage { flex: 1; padding: 20px; position: relative; }
        iframe { width: 100%; height: 100%; border-radius: 20px; border: 1px solid var(--border-color); background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* مؤشر النقطة المخصص */
        .pen-cursor { position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; transform: translate(-50%, -50%); display: none; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        canvas { position: absolute; top: 20px; left: 20px; width: calc(100% - 40px); height: calc(100% - 40px); z-index: 50; border-radius: 20px; pointer-events: none; }
        canvas.active { pointer-events: auto; cursor: none; }

        .toggle-sidebar { position: absolute; top: 50%; right: 0; width: 24px; height: 50px; background: #fff; border: 1px solid var(--border-color); border-radius: 12px 0 0 12px; cursor: pointer; color: var(--ai-primary); z-index: 101; display: flex; align-items: center; justify-content: center; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }

        /* لوحة الإدارة */
        .floating-config { position: fixed; bottom: 25px; left: 25px; z-index: 1000; }
        .config-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--ai-primary); color: #fff; border: none; cursor: pointer; box-shadow: 0 6px 15px rgba(2, 132, 199, 0.3); font-size: 1.4rem; }
        .admin-panel { position: fixed; right: 20px; bottom: 90px; width: 320px; background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 2000; border: 1px solid var(--border-color); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 10px; font-family: 'Tajawal'; font-size: 0.9rem; }
        
        input[type="range"] { accent-color: var(--ai-primary); cursor: pointer; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 10px; cursor: pointer; background: none; }
    </style>
</head>
<body>

<div id="app">
    <!-- النقطة التفاعلية -->
    <div id="pen-dot" class="pen-cursor" :style="{ width: penSize + 'px', height: penSize + 'px', backgroundColor: penColor }"></div>

    <aside class="sidebar" :class="{'sidebar-hidden': fullWidth}">
        <div class="header">
            <h2>قسم الكيمياء 🔬</h2>
            <small style="color: #64748b;">مدرسة ناصر العطية</small>
        </div>

        <!-- أهداف القسم (ثابتة لكل التابات) -->
        <div class="goals-list">
            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 15px; padding-right: 5px;">أهداف القسم الثابتة:</div>
            <div v-for="(goal, i) in globalGoals" :key="i" class="goal-card" :class="{ active: activeGoal === i }">
                <div class="goal-label" @click="activeGoal = (activeGoal === i ? null : i)">
                    <span>الهدف الثابت {{ i + 1 }}</span>
                    <span>{{ activeGoal === i ? '▲' : '▼' }}</span>
                </div>
                <div v-if="activeGoal === i" class="goal-content animate__animated animate__fadeIn">
                    <p>{{ goal }}</p>
                </div>
            </div>
        </div>

        <!-- لوحة التحكم المنفصلة -->
        <div class="toolbox-panel">
            <div class="toolbox-header" @click="toolboxExpanded = !toolboxExpanded">
                <span>إعدادات السبورة والشرح</span>
                <span>{{ toolboxExpanded ? '▼' : '▲' }}</span>
            </div>
            <div class="toolbox-body" :class="{'collapsed-body': !toolboxExpanded}">
                <div class="preview-box">
                    <div class="preview-circle" :style="{ width: penSize + 'px', height: penSize + 'px', backgroundColor: penColor }"></div>
                </div>
                <div class="tool-row">
                    <label>حجم الخط <span>{{ penSize }}px</span></label>
                    <input type="range" min="2" max="60" v-model="penSize">
                </div>
                <div class="tool-row">
                    <label>لون الكتابة</label>
                    <input type="color" v-model="penColor">
                </div>
                <div class="action-btns">
                    <button class="btn-tool" style="background:#fff1f2; color:#e11d48;" @click="clearCanvas">🗑️ مسح</button>
                    <button class="btn-tool" :style="{ background: penMode ? '#0284c7' : '#f8fafc', color: penMode ? '#fff' : '#64748b' }" @click="penMode = !penMode">
                        {{ penMode ? 'إيقاف القلم' : 'تفعيل القلم' }}
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <main class="content">
        <button class="toggle-sidebar" @click="fullWidth = !fullWidth">{{ fullWidth ? '◀' : '▶' }}</button>
        
        <nav class="tabs-bar">
            <div v-for="(tab, i) in tabs" :key="i" style="display:flex; align-items:center;">
                <button @click="currentTab = i" :class="['tab-btn', { active: currentTab === i }]">{{ tab.name }}</button>
                <button v-if="showAdmin" style="margin-right: -10px; color:red; border:none; background:none; cursor:pointer; z-index:1;" @click="removeTab(i)">✕</button>
            </div>
        </nav>
        
        <div class="iframe-stage">
            <iframe v-if="tabs.length > 0" :src="tabs[currentTab].url" allowfullscreen></iframe>
            <canvas id="canvas" :class="{ active: penMode }"></canvas>
        </div>
    </main>

    <!-- لوحة التحكم الإدارية -->
    <div class="floating-config">
        <button class="config-btn" @click="showAdmin = !showAdmin">⚙️</button>
    </div>

    <div v-if="showAdmin" class="admin-panel animate__animated animate__fadeInUp">
        <h4 style="margin:0 0 15px; color:var(--ai-primary);">إعدادات المنصة</h4>
        
        <div style="margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid #eee;">
            <label style="font-size:0.8rem; font-weight:bold;">تعديل الأهداف العامة (لكل التابات):</label>
            <textarea class="admin-input" v-model="goalsInput" placeholder="اكتب الأهداف.. كل هدف في سطر" rows="4"></textarea>
            <button class="btn-tool" style="width:100%; background:#0284c7; color:#fff;" @click="updateGlobalGoals">تحديث الأهداف 🎯</button>
        </div>

        <label style="font-size:0.8rem; font-weight:bold;">إضافة تاب (نشاط) جديد:</label>
        <input class="admin-input" v-model="newTab.name" placeholder="اسم النشاط">
        <input class="admin-input" v-model="newTab.url" placeholder="رابط النشاط">
        <button class="btn-tool" style="width:100%; background:#10b981; color:#fff;" @click="addTab">إضافة النشاط ✅</button>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, watch } = Vue;

    createApp({
        setup() {
            // مفاتيح التخزين
            const TABS_KEY = 'chem_tabs_v7';
            const GOALS_KEY = 'chem_goals_v7';

            // بيانات التابات
            const tabs = ref(JSON.parse(localStorage.getItem(TABS_KEY)) || [
                { name: 'بناء الذرة', url: 'https://phet.colorado.edu/sims/html/build-an-atom/latest/build-an-atom_all.html?locale=ar' },
                { name: 'المحاليل', url: 'https://phet.colorado.edu/sims/html/molarity/latest/molarity_all.html?locale=ar' }
            ]);

            // الأهداف العامة (ثابتة للكل)
            const globalGoals = ref(JSON.parse(localStorage.getItem(GOALS_KEY)) || [
                'التعرف على المفاهيم الكيميائية الأساسية',
                'تطبيق مهارات الاستقصاء العلمي',
                'ربط التجارب النظرية بالواقع العملي'
            ]);

            const currentTab = ref(0);
            const activeGoal = ref(null);
            const fullWidth = ref(false);
            const showAdmin = ref(false);
            const toolboxExpanded = ref(true);
            const goalsInput = ref(globalGoals.value.join('\n'));
            
            const penSize = ref(8);
            const penColor = ref('#0284c7');
            const penMode = ref(false);
            const newTab = ref({ name: '', url: '' });

            // مراقبة التغييرات لحفظها
            watch(tabs, (v) => localStorage.setItem(TABS_KEY, JSON.stringify(v)), { deep: true });
            watch(globalGoals, (v) => localStorage.setItem(GOALS_KEY, JSON.stringify(v)), { deep: true });

            const updateGlobalGoals = () => {
                globalGoals.value = goalsInput.value.split('\n').filter(g => g.trim());
                alert('تم توحيد الأهداف في جميع الأنشطة!');
            };

            const addTab = () => {
                if (newTab.value.name && newTab.value.url) {
                    tabs.value.push({ ...newTab.value });
                    newTab.value = { name: '', url: '' };
                }
            };

            const removeTab = (i) => { if(confirm('حذف النشاط؟')) tabs.value.splice(i, 1); };

            let ctx, canvas, penDot;
            onMounted(() => {
                canvas = document.getElementById('canvas');
                penDot = document.getElementById('pen-dot');
                ctx = canvas.getContext('2d');
                
                const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
                resize(); window.addEventListener('resize', resize);

                window.addEventListener('mousemove', (e) => {
                    if (penMode.value) {
                        const rect = canvas.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                            penDot.style.display = 'block';
                            penDot.style.left = e.clientX + 'px';
                            penDot.style.top = e.clientY + 'px';
                        } else { penDot.style.display = 'none'; }
                    } else { penDot.style.display = 'none'; }
                });

                let drawing = false;
                canvas.addEventListener('mousedown', () => { if(penMode.value) drawing = true; });
                canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
                canvas.addEventListener('mousemove', (e) => {
                    if(!drawing || !penMode.value) return;
                    ctx.lineWidth = penSize.value;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = penColor.value;
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                });
            });

            return { 
                tabs, currentTab, activeGoal, fullWidth, showAdmin, toolboxExpanded,
                penSize, penColor, penMode, newTab, globalGoals, goalsInput,
                updateGlobalGoals, addTab, removeTab, clearCanvas: () => ctx.clearRect(0,0,canvas.width,canvas.height)
            };
        }
    }).mount('#app');
</script>
</body>
</html>
